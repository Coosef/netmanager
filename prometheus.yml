global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    platform: netmanager
    environment: pilot

scrape_configs:
  # NetManager backend — Prometheus multiprocess metrics
  - job_name: netmanager_backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /api/v1/metrics
    scrape_timeout: 10s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
