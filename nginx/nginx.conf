map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Default rejection server ────────────────────────────────────────────
# Any Host header not listed in the authorized allowlist below (or a
# direct-IP request, or a missing Host header on HTTP/1.0) lands here.
# NetManager frontend, API and WebSocket upstreams are unreachable from
# this block by design — no proxy_pass, no location blocks. Returns
# 421 Misdirected Request (RFC 7540 §9.1.2 — server is not authoritative
# for this host) with a self-contained bilingual HTML page telling the
# operator to check DNS / reverse-proxy config. Replaces the earlier
# exact-host thinkflx silent-close rule shipped in PR #131: the deny
# is now generic, covers thinkflx + any future accidental exposure
# uniformly, and returns an informative page instead of a silent close
# so a legitimate misconfigured admin can self-service.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    server_tokens off;
    default_type text/html;
    charset utf-8;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-store" always;
    return 421 '<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yetkisiz Alan Adı | Unauthorized Domain</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:680px;margin:4rem auto;padding:2rem;color:#111;line-height:1.55}
    h1{color:#b91c1c;font-size:1.65rem}
    .en{margin-top:2rem;padding-top:1.25rem;border-top:1px solid #e5e7eb;color:#374151}
    .hint{margin-top:2rem;color:#6b7280;font-size:.9rem}
    code{background:#f3f4f6;padding:.15em .4em;border-radius:.25em}
  </style>
</head>
<body>
  <h1>Bu alan adı NetManager için yetkili değildir.</h1>
  <p>Domain veya DNS yönlendirmesi hatalı görünüyor.</p>
  <p>Lütfen domain yöneticinizle iletişime geçin ve yönlendirme ayarlarını kontrol edin.</p>
  <div class="en">
    <h2>Unauthorized domain</h2>
    <p>This domain is not authorized for NetManager.</p>
    <p>Please contact your domain administrator and review the DNS or reverse-proxy configuration.</p>
  </div>
  <p class="hint">Requested host: <code>$host</code></p>
</body>
</html>';
}

# ─── Authorized NetManager server ────────────────────────────────────────
# Only Host headers matching the explicit allowlist reach the frontend,
# API and WebSocket upstreams. The two hostnames are:
#   * netmanager.systrack.app — user-facing HTTPS panel (Cloudflare fronted)
#   * ws.systrack.app         — agent + browser WebSocket edge (letsencrypt
#                               terminated at the host-level nginx vhost)
# Every existing proxy / security / redirect block below is preserved
# verbatim from the pre-allowlist config; the only change is the
# `server_name` line and the removal of the redundant PR-#131
# thinkflx deny block above.
server {
    listen 80;
    listen [::]:80;
    server_name netmanager.systrack.app ws.systrack.app;
    server_tokens off;
    client_max_body_size 64m;

    # Docker DNS resolver — container yeniden başlayınca IP değişebilir, 10s'de bir yenile
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    set $backend  "http://backend:8000";
    set $frontend "http://frontend:3000";

    # ── T8.4 Security F1 — defensive global blocks ─────────────────────────
    # Vite dev path'leri prod'da kesinlikle 404 (CyberStrike pentest HIGH
    # bulgu kapatma). Frontend production stage zaten bunları döndürmüyor
    # ama defansif ikinci katman: yanlışlıkla dev mode'a düşülürse koru.
    location ~ ^/@(vite|fs|react-refresh|id|vite/client) { return 404; }
    location ~ ^/src/                                    { return 404; }
    location ~ ^/node_modules/                           { return 404; }
    location = /__open-in-editor                         { return 404; }

    # ── T8.4 Security F1 — Global security headers ─────────────────────────
    # Cloudflare termination'ında HSTS edge'de işlenir; origin'de de açık olsun
    # (defansif, direct-IP isteklerine karşı). always = error sayfalarına da
    # yapışsın.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"            always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"  always;

    # ── HTTP → HTTPS redirect (Cloudflare üzerinden gelen X-Forwarded-Proto'ya
    #    göre). CF panelinde "Always Use HTTPS" ON ise edge zaten 301'liyor;
    #    bu, doğrudan-IP isteğinde de redirect zorluyor. ───────────────────
    if ($http_x_forwarded_proto = "http") {
        return 308 https://$host$request_uri;
    }

    # ── WebSocket endpoints (agents + events) — 1 saatlik timeout ──────────
    location /api/v1/ws {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }

    location /api/v1/agents/ws {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }

    # ── REST API ────────────────────────────────────────────────────────────
    location /api {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_buffering       off;
    }

    # ── Health/readiness (T10 B1b) — backend:8000 host'a publish edilmiyor;
    #    liveness/readiness tek dış kapıdan (nginx) erişilebilsin. /api dışında
    #    kaldığı için ayrı location gerekiyor (yoksa "/" frontend'e düşerdi).
    location /health {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    10s;
        proxy_buffering       off;
    }

    # ── Frontend (production: nginx + dist; dev: Vite HMR WebSocket) ───────
    location / {
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_buffering       off;
    }
}
