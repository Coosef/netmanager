map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;
    client_max_body_size 64m;

    # Docker DNS resolver — container yeniden başlayınca IP değişebilir, 10s'de bir yenile
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    set $backend  "http://backend:8000";
    set $frontend "http://frontend:3000";

    # ── T8.4 Security F1 — defensive global blocks ─────────────────────────
    # Vite dev path'leri prod'da kesinlikle 404 (CyberStrike pentest HIGH
    # bulgu kapatma). Frontend production stage zaten bunları döndürmüyor
    # ama defansif ikinci katman: yanlışlıkla dev mode'a düşülürse koru.
    location ~ ^/@(vite|fs|react-refresh|id|vite/client) { return 404; }
    location ~ ^/src/                                    { return 404; }
    location ~ ^/node_modules/                           { return 404; }
    location = /__open-in-editor                         { return 404; }

    # ── T8.4 Security F1 — Global security headers ─────────────────────────
    # Cloudflare termination'ında HSTS edge'de işlenir; origin'de de açık olsun
    # (defansif, direct-IP isteklerine karşı). always = error sayfalarına da
    # yapışsın.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"            always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"  always;

    # ── HTTP → HTTPS redirect (Cloudflare üzerinden gelen X-Forwarded-Proto'ya
    #    göre). CF panelinde "Always Use HTTPS" ON ise edge zaten 301'liyor;
    #    bu, doğrudan-IP isteğinde de redirect zorluyor. ───────────────────
    if ($http_x_forwarded_proto = "http") {
        return 308 https://$host$request_uri;
    }

    # ── WebSocket endpoints (agents + events) — 1 saatlik timeout ──────────
    location /api/v1/ws {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }

    location /api/v1/agents/ws {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }

    # ── REST API ────────────────────────────────────────────────────────────
    location /api {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_buffering       off;
    }

    # ── Frontend (production: nginx + dist; dev: Vite HMR WebSocket) ───────
    location / {
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_buffering       off;
    }
}
