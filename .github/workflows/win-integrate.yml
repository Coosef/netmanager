name: win-integrate

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'charon-agent-host/**'
      - '.github/workflows/win-integrate.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'charon-agent-host/**'
      - '.github/workflows/win-integrate.yml'

jobs:
  # ────────────────────────────────────────────────────────────────
  # Backend unit — pytest of the new endpoint, installer invariants
  # and Linux isolation guards. Fast feedback on Ubuntu before paying
  # for a Docker build.
  # ────────────────────────────────────────────────────────────────
  backend-unit:
    name: Backend unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend requirements (only what tests need)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # Tests only need pydantic-settings + a few stdlib helpers; we
          # install the full backend requirements so future tests that
          # touch more app modules don't have to special-case CI.
          pip install -r requirements.txt

      - name: Pytest WIN-INTEGRATE suite
        working-directory: backend
        run: |
          python -m pytest -q \
            tests/test_agents_windows_installer_win_integrate.py \
            tests/test_agents_host_binary_endpoint.py \
            tests/test_agents_linux_isolation.py

  # ────────────────────────────────────────────────────────────────
  # Backend Docker build — proves the multi-stage build embeds the
  # host binary correctly. This is the single CI gate that catches
  # context regressions, missing files, broken multi-arch builds, etc.
  # ────────────────────────────────────────────────────────────────
  backend-image:
    name: Backend Docker image
    runs-on: ubuntu-latest
    needs: backend-unit
    steps:
      - uses: actions/checkout@v4

      - name: Compute HOST_VERSION
        id: ver
        run: |
          echo "HOST_VERSION=2.0.0-mvp0+g$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: docker compose config sanity
        run: |
          # Surface compose / dockerfile path issues before we build a
          # 400 MB image and discover it 5 minutes in. Compose reads
          # .env for variable interpolation — write a minimal one so
          # the config command doesn't bail on "file not found".
          touch .env
          docker compose config -q

      - name: Build backend image only
        env:
          HOST_VERSION: ${{ steps.ver.outputs.HOST_VERSION }}
        run: |
          # docker compose build on GitHub runners delegates to buildx,
          # which by default produces a multi-platform attestation image
          # that never lands in the local docker image store. Subsequent
          # `docker run switch-backend:latest` then fails with "Unable
          # to find image". Use plain `docker build` against the same
          # Dockerfile + context so the result is a regular local image
          # — and so this CI gate also exercises the exact COPY paths
          # the compose-driven build would.
          docker build \
            --build-arg HOST_VERSION="${HOST_VERSION}" \
            -f backend/Dockerfile \
            -t switch-backend:latest \
            .

      - name: Embedded host binary present + sidecar match
        run: |
          IMG=switch-backend:latest
          docker run --rm "$IMG" ls -lh /opt/netmanager/agent-bins/
          ACTUAL=$(docker run --rm "$IMG" sha256sum /opt/netmanager/agent-bins/charon-agent-host-windows-amd64.exe | awk '{print $1}')
          SIDE=$(docker run --rm "$IMG" cat /opt/netmanager/agent-bins/charon-agent-host-windows-amd64.exe.sha256 | tr -d '[:space:]')
          echo "actual=$ACTUAL"
          echo "sidecar=$SIDE"
          test "$ACTUAL" = "$SIDE"

      - name: Binary is PE32+ x86-64
        run: |
          IMG=switch-backend:latest
          docker run --rm "$IMG" sh -c \
            'apt-get update -qq && apt-get install -qq -y file >/dev/null && file /opt/netmanager/agent-bins/charon-agent-host-windows-amd64.exe' \
            | tee /tmp/file.out
          grep -q 'PE32+ executable .* x86-64' /tmp/file.out

      - name: Binary contains NO UPX magic
        run: |
          IMG=switch-backend:latest
          # `! grep` returns 0 when the pattern is absent — the
          # success path is: UPX magic not found.
          docker run --rm "$IMG" sh -c \
            '! grep -aqE "UPX!" /opt/netmanager/agent-bins/charon-agent-host-windows-amd64.exe'

      - name: Binary embeds HOST_VERSION (not "dev")
        env:
          HOST_VERSION: ${{ steps.ver.outputs.HOST_VERSION }}
        run: |
          IMG=switch-backend:latest
          docker run --rm "$IMG" sh -c \
            "apt-get install -qq -y binutils >/dev/null && strings /opt/netmanager/agent-bins/charon-agent-host-windows-amd64.exe" \
            | grep -F "${HOST_VERSION}"

      - name: Report binary size
        run: |
          IMG=switch-backend:latest
          docker run --rm "$IMG" stat -c '%s bytes' /opt/netmanager/agent-bins/charon-agent-host-windows-amd64.exe

  # ────────────────────────────────────────────────────────────────
  # Windows PowerShell 5.1 — real powershell.exe (not pwsh) parses the
  # generated installer. The byte-level invariants (BOM, CRLF, ASCII)
  # are checked here against a freshly generated installer so any
  # response wrapper regression also fails fast.
  # ────────────────────────────────────────────────────────────────
  installer-ps51:
    name: Installer PS 5.1 (windows-2022)
    runs-on: windows-2022
    needs: backend-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend requirements
        shell: bash
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Confirm Windows PowerShell 5.1
        shell: powershell
        run: |
          $ver = $PSVersionTable.PSVersion
          Write-Host "PowerShell version: $ver"
          if ($ver.Major -ne 5) { throw "Test must run on Windows PowerShell 5.1" }

      - name: Generate installer (response wrapper byte-perfect)
        shell: bash
        working-directory: backend
        env:
          # postgresql+asyncpg URLs avoid the SQLite + pool_size conflict
          # in app.core.database (we never actually open a connection;
          # the URL just needs to be NOT-SQLite to bypass the kwargs
          # filter shim that conftest.py installs for pytest).
          DATABASE_URL: postgresql+asyncpg://x:y@localhost/db
          SYNC_DATABASE_URL: postgresql+psycopg2://x:y@localhost/db
          SECRET_KEY: testing
        run: |
          # CREDENTIAL_ENCRYPTION_KEY must be a valid Fernet key.
          export CREDENTIAL_ENCRYPTION_KEY="$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')"
          # Generate the response BODY exactly as the endpoint would:
          # BOM + CRLF + UTF-8 encoded script. Write directly into
          # $RUNNER_TEMP — Windows runners don't have /tmp.
          DEST="${RUNNER_TEMP//\\//}/installer.ps1"
          python - "$DEST" <<'PY'
          import sys
          from app.api.v1.endpoints.agents import _windows_installer
          dest = sys.argv[1]
          script = _windows_installer("test-agent", "REDACTED", "https://netmanager.example.app")
          body = b"\xef\xbb\xbf" + script.replace("\r\n","\n").replace("\n","\r\n").encode("utf-8")
          with open(dest, "wb") as f:
              f.write(body)
          print("wrote", dest, len(body), "bytes")
          PY
          ls -l "$DEST"
          echo "INSTALLER_PATH=$DEST" >> "$GITHUB_ENV"

      - name: ParseFile → 0 errors
        shell: powershell
        run: |
          $path = $env:INSTALLER_PATH
          $errors = $null; $tokens = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            $path, [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List *
            throw "Parser errors: $($errors.Count)"
          }
          Write-Host "Parser errors: 0"

      - name: Byte-level invariants
        shell: powershell
        run: |
          $bytes = [System.IO.File]::ReadAllBytes($env:INSTALLER_PATH)
          if ($bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) {
            throw "BOM missing (first 3 bytes: $($bytes[0..2] -join ' '))"
          }
          if ($bytes[3] -eq 0xEF -and $bytes[4] -eq 0xBB -and $bytes[5] -eq 0xBF) {
            throw "Double BOM detected"
          }
          $content = [System.Text.Encoding]::UTF8.GetString($bytes, 3, $bytes.Length - 3)
          $crlf = ([regex]::Matches($content, "`r`n")).Count
          $bareLf = ([regex]::Matches($content, "(?<!`r)`n")).Count
          if ($bareLf -gt 0) { throw "Bare LF detected: $bareLf" }
          if ($crlf -lt 30) { throw "Suspiciously low CRLF count: $crlf" }
          $nonAscii = ($content.ToCharArray() | Where-Object { [int][char]$_ -gt 127 }).Count
          if ($nonAscii -gt 0) { throw "Non-ASCII characters in installer: $nonAscii" }
          Write-Host "[OK] BOM=1, CRLF=$crlf, ASCII-safe"

      - name: Locale-independent + Go-host invariants
        shell: powershell
        run: |
          $content = [System.IO.File]::ReadAllText($env:INSTALLER_PATH)
          if ($content -match 'IsInRole\("Administrator"\)') {
            throw "Hardcoded English admin string"
          }
          if ($content -notmatch '\[Security\.Principal\.WindowsBuiltInRole\]::Administrator') {
            throw "WindowsBuiltInRole enum missing"
          }
          if ($content -notmatch 'S-1-5-18' -or $content -notmatch 'S-1-5-32-544') {
            throw "SID-based ACL missing"
          }
          if ($content -match 'sc\.exe\s+(create|start|failure)') {
            throw "Architectural regression: sc.exe service block returned"
          }
          if ($content -notmatch '--child-arg') {
            throw "Go host CLI install section missing"
          }
          if ($content -notmatch '\$status10\.Trim\(\)\s+-ne\s+"Running"') {
            throw "10s exact-match status check missing"
          }
          if ($content -notmatch '\$status30\.Trim\(\)\s+-ne\s+"Running"') {
            throw "30s exact-match status check missing"
          }
          Write-Host "[OK] All invariant patterns present / removed as required"
