name: charon-agent-bootstrapper

on:
  pull_request:
    paths:
      - 'charon-agent-host/cmd/charon-agent-bootstrapper/**'
      - 'charon-agent-host/internal/bootstrapper/**'
      - 'charon-agent-host/go.mod'
      - 'charon-agent-host/go.sum'
      - '.github/workflows/charon-agent-bootstrapper.yml'
  push:
    branches: [main]
    paths:
      - 'charon-agent-host/cmd/charon-agent-bootstrapper/**'
      - 'charon-agent-host/internal/bootstrapper/**'
      - 'charon-agent-host/go.mod'
      - 'charon-agent-host/go.sum'
      - '.github/workflows/charon-agent-bootstrapper.yml'

defaults:
  run:
    working-directory: charon-agent-host

jobs:
  # ────────────────────────────────────────────────────────────────
  # Unit -- Linux. Pure-Go bootstrapper packages: platform/
  # (cross-platform half), install/, security/, runtime/.
  # Architecture-tagged platform/* files are NOT compiled here --
  # the !windows stub files keep the package compilable on Linux
  # so the cross-platform unit tests can run.
  # ────────────────────────────────────────────────────────────────
  unit:
    name: Unit (Linux) -- bootstrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: charon-agent-host/go.sum

      - name: go vet
        run: go vet ./internal/bootstrapper/... ./cmd/charon-agent-bootstrapper/...

      - name: gofmt
        run: |
          out=$(gofmt -l -s ./internal/bootstrapper ./cmd/charon-agent-bootstrapper)
          if [ -n "$out" ]; then
            echo "::error::Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go test
        run: go test -race -timeout 60s ./internal/bootstrapper/...

  # ────────────────────────────────────────────────────────────────
  # Cross-compile -- windows/amd64 bootstrapper EXE.
  # Trimpath + -s -w -- consistent with charon-agent-host. UPX is
  # explicitly NOT used; the EDR-friendly + SmartScreen-friendly
  # build settings carry over from the host.
  # ────────────────────────────────────────────────────────────────
  build-amd64:
    name: Cross-compile (windows/amd64) -- bootstrapper
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: charon-agent-host/go.sum

      - name: Build windows-amd64
        env:
          CGO_ENABLED: '0'
          GOOS: windows
          GOARCH: amd64
        run: |
          mkdir -p bin
          go build -trimpath -ldflags "-s -w" \
            -o bin/charon-agent-bootstrapper-windows-amd64.exe \
            ./cmd/charon-agent-bootstrapper
          ls -lh bin/

      - name: Verify PE32+ Windows binary (x86-64)
        run: |
          file bin/charon-agent-bootstrapper-windows-amd64.exe
          file bin/charon-agent-bootstrapper-windows-amd64.exe | grep -q 'PE32+ executable .* x86-64' || {
            echo "::error::Built binary is not PE32+ x86-64"
            exit 1
          }

      - name: SHA-256
        run: |
          sha256sum bin/charon-agent-bootstrapper-windows-amd64.exe \
            > bin/charon-agent-bootstrapper-windows-amd64.exe.sha256
          cat bin/charon-agent-bootstrapper-windows-amd64.exe.sha256

      - name: Binary size bound (<= 30 MiB)
        run: |
          size=$(stat -c %s bin/charon-agent-bootstrapper-windows-amd64.exe)
          echo "amd64 size: $size bytes"
          # PR-B skeleton bootstrapper -- the planning-only binary is
          # tiny. The ceiling is generous; PR-C / PR-F will tighten
          # when private-runtime embedding starts.
          if [ "$size" -gt 31457280 ]; then
            echo "::error::amd64 binary exceeds 30 MiB ceiling"
            exit 1
          fi

      - name: Confirm UPX is not used
        run: |
          if grep -aqE 'UPX!' bin/charon-agent-bootstrapper-windows-amd64.exe; then
            echo "::error::UPX magic detected -- UPX is explicitly forbidden"
            exit 1
          fi

      - name: No embedded real-shape agent_key
        run: |
          # Plain-bytes scan for a 64-char lowercase hex run, the
          # rendered installer's secret literal shape. A skeleton
          # binary should never carry one.
          if grep -aqE '[a-f0-9]{64}' bin/charon-agent-bootstrapper-windows-amd64.exe; then
            echo "::error::amd64 binary contains a 64-char hex run resembling an agent_key"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: charon-agent-bootstrapper-windows-amd64-development-skeleton-NOT-FOR-PRODUCTION
          path: |
            charon-agent-host/bin/charon-agent-bootstrapper-windows-amd64.exe
            charon-agent-host/bin/charon-agent-bootstrapper-windows-amd64.exe.sha256
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # Cross-compile -- windows/386 bootstrapper EXE. The 32-bit
  # build is the heart of PR-B: it proves the Go module compiles
  # cleanly under GOARCH=386 and the linked PE binary is the
  # correct 32-bit shape. No real x86 runner is available in our
  # CI tier; the binary is verified at the PE-header level only.
  # End-to-end execution on real 32-bit Windows is a manual lab
  # task documented in WINDOWS_AGENT_BOOTSTRAPPER.md.
  # ────────────────────────────────────────────────────────────────
  build-386:
    name: Cross-compile (windows/386) -- bootstrapper
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: charon-agent-host/go.sum

      - name: Build windows-386
        env:
          CGO_ENABLED: '0'
          GOOS: windows
          GOARCH: '386'
        run: |
          mkdir -p bin
          go build -trimpath -ldflags "-s -w" \
            -o bin/charon-agent-bootstrapper-windows-386.exe \
            ./cmd/charon-agent-bootstrapper
          ls -lh bin/

      - name: Verify PE32 Windows binary (Intel 80386)
        run: |
          file bin/charon-agent-bootstrapper-windows-386.exe
          file bin/charon-agent-bootstrapper-windows-386.exe | grep -q 'PE32 executable .* 80386' || {
            echo "::error::Built binary is not PE32 Intel 80386"
            exit 1
          }
          # Belt-and-braces: the 386 binary must NOT match the PE32+
          # signature, even partially.
          if file bin/charon-agent-bootstrapper-windows-386.exe | grep -q 'PE32+'; then
            echo "::error::386 binary claims PE32+ -- architecture mismatch"
            exit 1
          fi

      - name: SHA-256
        run: |
          sha256sum bin/charon-agent-bootstrapper-windows-386.exe \
            > bin/charon-agent-bootstrapper-windows-386.exe.sha256
          cat bin/charon-agent-bootstrapper-windows-386.exe.sha256

      - name: Binary size bound (<= 30 MiB)
        run: |
          size=$(stat -c %s bin/charon-agent-bootstrapper-windows-386.exe)
          echo "386 size: $size bytes"
          if [ "$size" -gt 31457280 ]; then
            echo "::error::386 binary exceeds 30 MiB ceiling"
            exit 1
          fi

      - name: Confirm UPX is not used
        run: |
          if grep -aqE 'UPX!' bin/charon-agent-bootstrapper-windows-386.exe; then
            echo "::error::UPX magic detected -- UPX is explicitly forbidden"
            exit 1
          fi

      - name: No embedded real-shape agent_key
        run: |
          if grep -aqE '[a-f0-9]{64}' bin/charon-agent-bootstrapper-windows-386.exe; then
            echo "::error::386 binary contains a 64-char hex run resembling an agent_key"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: charon-agent-bootstrapper-windows-386-development-skeleton-NOT-FOR-PRODUCTION
          path: |
            charon-agent-host/bin/charon-agent-bootstrapper-windows-386.exe
            charon-agent-host/bin/charon-agent-bootstrapper-windows-386.exe.sha256
          retention-days: 7
