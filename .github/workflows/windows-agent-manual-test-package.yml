name: windows-agent-manual-test-package
# Validates the windows-agent-v2-manual-test/ package on a real
# Windows PowerShell 5.1 runner before it can ship.
#
# Hard gates:
#   - every .ps1 must parse on Windows PowerShell 5.1
#   - every .ps1/.txt/.json must have UTF-8 BOM
#   - every .ps1/.txt/.json must be CRLF-only (no bare LF, no double BOM)
#   - every .ps1/.txt/.json must be ASCII-only (no cp1254 hazard)
#   - no .ps1 may contain forbidden patterns:
#         | iex   |   | Invoke-Expression   |   sc.exe create
#         sc.exe start   |   IsInRole("Administrator")
#     (raw command form -- a $forbidden array literal that NAMES these
#     patterns inside 02-run-installer.ps1 is allowed because it is the
#     wrapper's refusal list)
#   - 02-run-installer.ps1 must reference the required markers:
#         WindowsBuiltInRole, S-1-5-18, S-1-5-32-544,
#         charon-agent-host, --child-arg, Get-FileHash,
#         Restore-PreviousAgentService
#   - SHA256SUMS.txt must match recomputed digests for every listed file

on:
  pull_request:
    paths:
      - "windows-agent-v2-manual-test/**"
      - ".github/workflows/windows-agent-manual-test-package.yml"
  push:
    branches: [main]
    paths:
      - "windows-agent-v2-manual-test/**"
      - ".github/workflows/windows-agent-manual-test-package.yml"
  workflow_dispatch:

jobs:
  validate-package:
    # Run the same gate on every still-supported Windows Server runner.
    # GitHub retired windows-2019 in Sept 2025; the closest remaining
    # runner to the operator's Windows Server 2019 / PS 5.1 environment
    # is windows-2022, and windows-2025 catches forward-compat issues.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PowerShell version banner
        run: |
          Write-Host ("PSVersion: " + $PSVersionTable.PSVersion.ToString())
          Write-Host ("PSEdition: " + $PSVersionTable.PSEdition)
          if ($PSVersionTable.PSVersion.Major -ne 5) {
            Write-Host "::error::This job must run on Windows PowerShell 5.1; got $($PSVersionTable.PSVersion)."
            exit 1
          }

      - name: Byte invariants (BOM + CRLF + ASCII + no double BOM)
        run: |
          $root  = Join-Path $env:GITHUB_WORKSPACE "windows-agent-v2-manual-test"
          $files = Get-ChildItem -LiteralPath $root -File |
                   Where-Object { $_.Extension -in @(".ps1",".txt",".json") }
          $fail = 0
          foreach ($f in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($f.FullName)
            $bomOk     = ($bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF)
            $doubleBom = $false
            if ($bytes.Length -ge 6) {
              $doubleBom = ($bytes[3] -eq 0xEF -and $bytes[4] -eq 0xBB -and $bytes[5] -eq 0xBF)
            }
            $text = [System.Text.Encoding]::UTF8.GetString($bytes, 3, $bytes.Length - 3)
            $bareLf = ([regex]::Matches($text, "(?<!`r)`n")).Count
            $nonAscii = 0
            foreach ($c in $text.ToCharArray()) { if ([int][char]$c -gt 127) { $nonAscii++ } }
            $row = ("{0,-40} BOM={1} 2BOM={2} bareLF={3} nonASCII={4}" -f $f.Name, $bomOk, $doubleBom, $bareLf, $nonAscii)
            if ((-not $bomOk) -or $doubleBom -or $bareLf -gt 0 -or $nonAscii -gt 0) {
              Write-Host "::error::$row"
              $fail++
            } else {
              Write-Host $row
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: ParseFile gate (Windows PowerShell 5.1)
        run: |
          $root  = Join-Path $env:GITHUB_WORKSPACE "windows-agent-v2-manual-test"
          $files = Get-ChildItem -LiteralPath $root -File -Filter "*.ps1"
          $fail = 0
          foreach ($f in $files) {
            $tokens = $null
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
                       $f.FullName, [ref]$tokens, [ref]$errors)
            if ($errors -and $errors.Count -gt 0) {
              foreach ($e in $errors) {
                Write-Host "::error file=$($f.Name),line=$($e.Extent.StartLineNumber)::$($e.Message)"
              }
              $fail++
            } else {
              Write-Host "OK    $($f.Name)"
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: Forbidden patterns (raw command form, excludes refusal-list literals)
        run: |
          $root  = Join-Path $env:GITHUB_WORKSPACE "windows-agent-v2-manual-test"
          $files = Get-ChildItem -LiteralPath $root -File -Filter "*.ps1"
          # Each entry: regex match against raw line, after we strip
          # full-line comments. The wrapper at 02-run-installer.ps1 lists
          # these patterns as string literals inside the $forbidden array
          # -- we tolerate that by skipping string-literal hits between
          # single quotes.
          $forbidden = @(
            '\|\s*iex\b',
            '\|\s*Invoke-Expression\b',
            '\bInvoke-Expression\b',
            '\bsc\.exe\s+create\b',
            '\bsc\.exe\s+start\b',
            'IsInRole\("Administrator"\)'
          )
          $fail = 0
          foreach ($f in $files) {
            $i = 0
            foreach ($line in [System.IO.File]::ReadAllLines($f.FullName)) {
              $i++
              $stripped = $line.Trim()
              if ($stripped.StartsWith("#")) { continue }
              # Drop content inside single-quoted string literals
              $sanitized = [regex]::Replace($line, "'[^']*'", "''")
              foreach ($pat in $forbidden) {
                if ($sanitized -match $pat) {
                  Write-Host "::error file=$($f.Name),line=$i::forbidden pattern '$pat' in: $stripped"
                  $fail++
                }
              }
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: Required markers in 02-run-installer.ps1
        run: |
          $p = Join-Path $env:GITHUB_WORKSPACE "windows-agent-v2-manual-test\02-run-installer.ps1"
          $text = [System.IO.File]::ReadAllText($p)
          $required = @(
            'WindowsBuiltInRole',
            'S-1-5-18',
            'S-1-5-32-544',
            'charon-agent-host',
            '--child-arg',
            'Get-FileHash',
            'Restore-PreviousAgentService'
          )
          $fail = 0
          foreach ($r in $required) {
            if ($text -notmatch [regex]::Escape($r)) {
              Write-Host "::error::missing required marker: $r"
              $fail++
            } else {
              Write-Host "OK    $r"
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: SHA256SUMS.txt matches recomputed digests
        run: |
          $root = Join-Path $env:GITHUB_WORKSPACE "windows-agent-v2-manual-test"
          $sumsPath = Join-Path $root "SHA256SUMS.txt"
          if (-not (Test-Path -LiteralPath $sumsPath)) {
            Write-Host "::error::SHA256SUMS.txt missing."
            exit 1
          }
          $lines = Get-Content -LiteralPath $sumsPath
          $fail = 0
          foreach ($l in $lines) {
            $clean = $l.Trim()
            if ($clean.Length -eq 0) { continue }
            $parts = $clean -split '\s+', 2
            if ($parts.Length -lt 2) { continue }
            $expected = $parts[0]
            $name     = $parts[1]
            $fp = Join-Path $root $name
            if (-not (Test-Path -LiteralPath $fp)) {
              Write-Host "::error::SHA256SUMS lists missing file: $name"
              $fail++
              continue
            }
            $actual = (Get-FileHash -LiteralPath $fp -Algorithm SHA256).Hash
            if ($expected.ToUpperInvariant() -ne $actual.ToUpperInvariant()) {
              Write-Host "::error::$name SHA mismatch: expected $expected actual $actual"
              $fail++
            } else {
              Write-Host "OK    $name"
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: AST reserved-variable assignment scan
        run: |
          $root = Join-Path $env:GITHUB_WORKSPACE "windows-agent-v2-manual-test"
          # Names that raise "Cannot overwrite variable" on Windows PowerShell 5.1.
          # $null is excluded -- assignment to $null is the canonical discard idiom in PS.
          $reserved = @(
            "PSEdition","PID","Host","HOME","PSHome","PSCulture","PsUICulture",
            "MyInvocation","PSCommandPath","PSScriptRoot","ExecutionContext",
            "PSVersionTable","ShellId","ConsoleFileName","true","false","this"
          )
          $reservedLc = $reserved | ForEach-Object { $_.ToLowerInvariant() }
          $fail = 0
          foreach ($f in (Get-ChildItem -LiteralPath $root -File -Filter "*.ps1" | Sort-Object Name)) {
            $tokens = $null; $errors = $null
            $ast = [System.Management.Automation.Language.Parser]::ParseFile(
                     $f.FullName, [ref]$tokens, [ref]$errors)
            $assigns = $ast.FindAll({
              param($n) $n -is [System.Management.Automation.Language.AssignmentStatementAst]
            }, $true)
            $hits = 0
            foreach ($a in $assigns) {
              $left = $a.Left
              if ($left -is [System.Management.Automation.Language.VariableExpressionAst]) {
                $name = $left.VariablePath.UserPath
                if ($reservedLc -contains $name.ToLowerInvariant()) {
                  Write-Host "::error file=$($f.Name),line=$($a.Extent.StartLineNumber)::reserved-variable assignment: `$$name (case-insensitive collision with read-only automatic)"
                  $hits++
                  $fail++
                }
              }
            }
            if ($hits -eq 0) {
              Write-Host "AST OK     $($f.Name)"
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: Writer fixture unit test (UTF-8 BOM + CRLF + no NUL)
        run: |
          $tmp = Join-Path $env:RUNNER_TEMP "preflight-fixture.txt"
          $lines = New-Object System.Collections.Generic.List[string]
          $lines.Add("Line1") | Out-Null
          $lines.Add("Line2 contains AAA BBB") | Out-Null
          $lines.Add("") | Out-Null
          $lines.Add("PRECHECK_RESULT=PASS") | Out-Null
          # Authoritative writer (mirrors 01-preflight.ps1 helper)
          $joined = ($lines -join "`r`n")
          $normalized = $joined.TrimEnd([char]13, [char]10) + "`r`n"
          $enc = New-Object System.Text.UTF8Encoding($true)
          [System.IO.File]::WriteAllText($tmp, $normalized, $enc)
          $bytes = [System.IO.File]::ReadAllBytes($tmp)
          $fail = 0
          if ($bytes.Length -lt 30) { Write-Host "::error::fixture too small ($($bytes.Length))"; $fail++ }
          if (-not ($bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF)) {
            Write-Host "::error::BOM missing"; $fail++
          }
          if ($bytes[3] -eq 0xEF -and $bytes[4] -eq 0xBB -and $bytes[5] -eq 0xBF) {
            Write-Host "::error::double BOM"; $fail++
          }
          $nul = 0; foreach ($b in $bytes) { if ($b -eq 0) { $nul++ } }
          if ($nul -gt 0) { Write-Host "::error::NUL bytes = $nul"; $fail++ }
          $text = [System.Text.Encoding]::UTF8.GetString($bytes,3,$bytes.Length-3)
          $bareLf = ([regex]::Matches($text, "(?<!`r)`n")).Count
          if ($bareLf -gt 0) { Write-Host "::error::bare LF = $bareLf"; $fail++ }
          $readBack = Get-Content -LiteralPath $tmp
          if ($readBack.Count -ne 4) { Write-Host "::error::Get-Content returned $($readBack.Count) lines, expected 4"; $fail++ }
          if ($readBack[-1] -ne "PRECHECK_RESULT=PASS") { Write-Host "::error::last line was '$($readBack[-1])'"; $fail++ }
          Remove-Item -LiteralPath $tmp -Force -ErrorAction SilentlyContinue
          if ($fail -gt 0) { exit 1 } else { Write-Host "fixture OK" }

      - name: Real preflight execution on Windows PowerShell 5.1
        run: |
          # Run the actual 01-preflight.ps1 in a fresh PowerShell process.
          # CI runners may legitimately produce BLOCKED preflight (no python,
          # existing service, etc.) -- we only require:
          #   - no "Cannot overwrite variable" error
          #   - exit code in {0,1,3}  (not a crash code)
          #   - output file exists, size > 100, BOM=1, NUL=0, bare LF=0
          #   - last non-empty line is PRECHECK_RESULT=PASS|BLOCKED
          $script = Join-Path $env:GITHUB_WORKSPACE "windows-agent-v2-manual-test\01-preflight.ps1"
          $stdoutFile = Join-Path $env:RUNNER_TEMP "preflight-stdout.txt"
          $stderrFile = Join-Path $env:RUNNER_TEMP "preflight-stderr.txt"
          $proc = Start-Process -FilePath "powershell.exe" `
              -ArgumentList @("-NoProfile","-ExecutionPolicy","Bypass","-File", $script) `
              -Wait -PassThru -NoNewWindow `
              -RedirectStandardOutput $stdoutFile `
              -RedirectStandardError  $stderrFile
          $exitCode = $proc.ExitCode
          Write-Host ("preflight exit code: " + $exitCode)
          Write-Host "----- stdout -----"
          if (Test-Path -LiteralPath $stdoutFile) {
            Get-Content -LiteralPath $stdoutFile | ForEach-Object { Write-Host "  $_" }
          }
          Write-Host "----- stderr -----"
          if (Test-Path -LiteralPath $stderrFile) {
            $stderrText = Get-Content -LiteralPath $stderrFile -Raw
            if ($stderrText) {
              $stderrText -split "`r?`n" | ForEach-Object { Write-Host "  $_" }
              if ($stderrText -match "Cannot overwrite variable") {
                Write-Host "::error::preflight produced 'Cannot overwrite variable' (reserved-variable collision)."
                exit 1
              }
            }
          }
          if ($exitCode -notin @(0,1,3)) {
            Write-Host "::error::preflight exit code $exitCode is unexpected (allowed: 0,1,3)."
            exit 1
          }
          # ---- Dump the debug sidecar so we see runtime types + expected SHA
          $outDir = "C:\Users\Public\CharonAgentTest"
          $dbg    = Join-Path $outDir "preflight-debug.txt"
          if (Test-Path -LiteralPath $dbg) {
            Write-Host "----- preflight-debug.txt -----"
            Get-Content -LiteralPath $dbg | ForEach-Object { Write-Host "  $_" }
          } else {
            Write-Host "(no preflight-debug.txt)"
          }
          # Accept either preflight.txt OR preflight-write-failure.txt --
          # both satisfy the same byte contract; the second is the documented
          # fallback when self-validation rejects the primary output.
          $primary      = Join-Path $outDir "preflight.txt"
          $fallback     = Join-Path $outDir "preflight-write-failure.txt"
          $outFile      = $null
          if (Test-Path -LiteralPath $primary) {
            $outFile = $primary
            Write-Host "Using primary  : $primary"
          } elseif (Test-Path -LiteralPath $fallback) {
            $outFile = $fallback
            Write-Host "Using fallback : $fallback (primary not produced -- self-validation rejected)"
          } else {
            Write-Host "::error::Neither preflight.txt nor preflight-write-failure.txt was produced."
            Write-Host "Directory listing:"
            if (Test-Path -LiteralPath $outDir) {
              Get-ChildItem -LiteralPath $outDir -Force | ForEach-Object {
                Write-Host ("  " + $_.Name + "  " + $_.Length + " bytes")
              }
            } else {
              Write-Host "  (output directory itself missing)"
            }
            exit 1
          }
          $bytes = [System.IO.File]::ReadAllBytes($outFile)
          # Zero-fill regression: a file that is entirely 0x00 is the
          # exact failure mode reported on Windows Server 2019 with v2.
          $nul     = 0
          $nonZero = 0
          foreach ($b in $bytes) { if ($b -eq 0) { $nul++ } else { $nonZero++ } }
          if ($nonZero -eq 0) {
            Write-Host "::error::$outFile is entirely zero-filled ($($bytes.Length) bytes, all 0x00)"
            exit 1
          }
          if ($nul -gt 0) { Write-Host "::error::$outFile contains $nul NUL bytes"; exit 1 }
          if ($bytes.Length -lt 80) { Write-Host "::error::$outFile too small ($($bytes.Length) bytes)"; exit 1 }
          if (-not ($bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF)) {
            $h = ("{0:X2} {1:X2} {2:X2}" -f $bytes[0], $bytes[1], $bytes[2])
            Write-Host "::error::$outFile has no UTF-8 BOM (first 3 bytes: $h)"; exit 1
          }
          if ($bytes[3] -eq 0xEF -and $bytes[4] -eq 0xBB -and $bytes[5] -eq 0xBF) {
            Write-Host "::error::$outFile has double BOM"; exit 1
          }
          # Cross-check: writer SHA from the debug sidecar must equal disk SHA.
          if ((Test-Path -LiteralPath $dbg) -and ($outFile -eq $primary)) {
            $dbgText = Get-Content -LiteralPath $dbg -Raw
            $m = [regex]::Match($dbgText, "EXPECTED_SHA256=([0-9A-Fa-f]+)")
            if ($m.Success) {
              $expected = $m.Groups[1].Value.ToUpperInvariant()
              $sha = [System.Security.Cryptography.SHA256]::Create()
              try { $actualBytes = $sha.ComputeHash($bytes) } finally { $sha.Dispose() }
              $actual = ($actualBytes | ForEach-Object { "{0:X2}" -f $_ }) -join ""
              if ($expected -ne $actual) {
                Write-Host "::error::writer-vs-disk SHA mismatch: writer=$expected disk=$actual"
                exit 1
              } else {
                Write-Host ("writer-vs-disk SHA : OK ($($actual.Substring(0,16))...)")
              }
            }
          }
          $text = [System.Text.Encoding]::UTF8.GetString($bytes,3,$bytes.Length-3)
          $bareLf = ([regex]::Matches($text, "(?<!`r)`n")).Count
          if ($bareLf -gt 0) { Write-Host "::error::$outFile has $bareLf bare LFs"; exit 1 }
          $lns = $text -split "`r`n"
          $last = $null
          for ($i = $lns.Length - 1; $i -ge 0; $i--) {
            if ($lns[$i].Trim().Length -gt 0) { $last = $lns[$i]; break }
          }
          if ($last -notmatch "^PRECHECK_RESULT=(PASS|BLOCKED)$") {
            Write-Host "::error::$outFile last non-empty line is '$last', expected PRECHECK_RESULT=PASS|BLOCKED"
            exit 1
          }
          Write-Host ("size      : " + $bytes.Length)
          Write-Host ("BOM       : OK (EF BB BF)")
          Write-Host ("NUL count : 0")
          Write-Host ("bare LF   : 0")
          Write-Host ("last line : " + $last)

      - name: ZIP integrity (optional)
        run: |
          $zip = Join-Path $env:GITHUB_WORKSPACE "windows-agent-v2-manual-test-v3.zip"
          if (Test-Path -LiteralPath $zip) {
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            try {
              $a = [System.IO.Compression.ZipFile]::OpenRead($zip)
              Write-Host ("ZIP entries: " + $a.Entries.Count)
              foreach ($e in $a.Entries) { Write-Host (" - " + $e.FullName) }
              $a.Dispose()
            } catch {
              Write-Host "::error::ZIP open failed."
              exit 1
            }
          } else {
            Write-Host "windows-agent-v2-manual-test.zip not present; skipping ZIP integrity (package directory is authoritative)."
          }
