name: charon-agent-host

on:
  pull_request:
    paths:
      - 'charon-agent-host/**'
      - '.github/workflows/charon-agent-host.yml'
  push:
    branches: [main]
    paths:
      - 'charon-agent-host/**'

defaults:
  run:
    working-directory: charon-agent-host

jobs:
  # ────────────────────────────────────────────────────────────────
  # Cross-platform unit tests — fast feedback, runs on Linux. Covers
  # pure-Go packages (config, child/monitor, cli, logging/rotating).
  # ────────────────────────────────────────────────────────────────
  unit:
    name: Unit (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download deps + sync go.sum
        run: |
          go mod download
          go mod tidy
          # Surface any go.mod/go.sum drift the PR author missed.
          git diff --exit-code go.mod || (echo "go.mod is stale; run 'go mod tidy'" && exit 1)

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          out=$(gofmt -l -s .)
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go test
        run: go test -race -timeout 60s ./...

  # ────────────────────────────────────────────────────────────────
  # Cross-compile sanity — proves the Windows build is reproducible
  # from non-Windows hosts. UPX is intentionally NOT applied.
  # ────────────────────────────────────────────────────────────────
  cross-compile:
    name: Cross-compile (windows/amd64)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download deps
        run: go mod download

      - name: Build Windows amd64
        env:
          CGO_ENABLED: '0'
          GOOS: windows
          GOARCH: amd64
        run: |
          mkdir -p bin
          go build -trimpath -ldflags "-s -w" -o bin/charon-agent-host-windows-amd64.exe ./cmd/charon-agent-host
          ls -lh bin/

      - name: Print SHA-256
        run: sha256sum bin/charon-agent-host-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: charon-agent-host-windows-amd64
          path: charon-agent-host/bin/charon-agent-host-windows-amd64.exe
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # Windows integration — the only signal that actually proves the
  # SCM dispatcher accepts the host. Runs on windows-2022 and
  # exercises install → 10s Running → 30s Running → stop → uninstall.
  # ────────────────────────────────────────────────────────────────
  windows-integration:
    name: Integration (windows-2022)
    runs-on: windows-2022
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download deps
        run: go mod download

      - name: Confirm PowerShell 5.1 available
        shell: powershell
        run: |
          $ver = $PSVersionTable.PSVersion
          Write-Host "PowerShell version: $ver"
          if ($ver.Major -ne 5) {
            throw "Expected Windows PowerShell 5.1, got $ver"
          }

      - name: Verify Windows build succeeds locally
        run: go build ./cmd/charon-agent-host

      - name: Integration tests (administrator)
        shell: powershell
        run: |
          $p = Start-Process -FilePath "go" -ArgumentList "test","-tags=integration","-timeout","2m","./test/integration/..." `
                             -Verb RunAs -Wait -PassThru -WorkingDirectory $PWD
          if ($p.ExitCode -ne 0) {
            throw "Integration tests failed (exit $($p.ExitCode))"
          }
