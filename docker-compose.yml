version: '3.8'

services:
  postgres:
    networks: [internal]            # T10 B1c — yalnız internal (edge'den erişilemez)
    image: timescale/timescaledb:latest-pg16
    # max_connections bumped from default 50 (TimescaleDB image override) to
    # 200 — Faz 6A introduced 3 separate Celery worker pools, total demand
    # across backend + 3 workers + beat + flower can spike to ~120 with the
    # current SQLAlchemy pool_size=20/overflow=40 config. With max=50 we hit
    # asyncpg.exceptions.TooManyConnectionsError under normal load (observed
    # 126 errors/hour post-deploy, triggering agent WS flap).
    # 6GB host RAM comfortably supports 200 conn (~3GB peak).
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-netmgr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netmgr123}
      POSTGRES_DB: ${POSTGRES_DB:-network_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # T10 B1a — host'a publish YOK; yalnız konteynerler arası (expose). Host'tan
    # debug için docker-compose.dev.yml overlay'i 5432'yi geri publish eder.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netmgr} -d ${POSTGRES_DB:-network_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    networks: [internal]            # T10 B1c — yalnız internal
    image: redis:8-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # T10 B1a — host'a publish YOK (expose). Host debug için docker-compose.dev.yml.
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    networks: [internal]            # T10 B1c
    build: { context: ., dockerfile: backend/Dockerfile }
    # Faz 6B G7: clear this service's own multiproc subdir on start (stale .db
    # files from dead pids would otherwise accumulate); exec keeps SIGTERM.
    command:
      - /bin/sh
      - -c
      - "rm -rf /tmp/prom_multiproc/backend && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-graceful-shutdown 30 --proxy-headers --forwarded-allow-ips='*'"
    volumes:
      - ./backend:/app
      - config_backups:/app/backups
      - prom_multiproc:/tmp/prom_multiproc
    # T10 B1b — host'a publish YOK; nginx (tek dış kapı) `backend:8000`'e
    # proxy'liyor. Host'tan direct API/debug için docker-compose.dev.yml 8000'i açar.
    expose:
      - "8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      # Faz 7 — Alembic connects with the SUPERUSER role (DDL + RLS bypass);
      # the app URLs above use the non-superuser netmgr_app role so RLS bites.
      - MIGRATION_DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-netmgr}:${POSTGRES_PASSWORD:-netmgr123}@postgres:5432/${POSTGRES_DB:-network_manager}
      - REDIS_URL=redis://redis:6379/0
      # Faz 6B G7: per-service subdir — no cross-container pid=1 collision
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prom_multiproc/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # curl is not in the backend image; use python3 (already present) to hit /health/live
      test: ["CMD", "python3", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/live', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: "2g"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Faz 6A — 3 isolated worker pools (was single worker --concurrency=30)
  # monitor: high-concurrency I/O-bound polling (SNMP, topology, playbooks, analytics)
  celery_worker:
    networks: [internal]            # T10 B1c
    build: { context: ., dockerfile: backend/Dockerfile }
    command:
      - /bin/sh
      - -c
      - "rm -rf /tmp/prom_multiproc/celery_worker && exec celery -A app.workers.celery_app worker --loglevel=info --concurrency=16 -Q monitor -n monitor@%h"
    volumes:
      - ./backend:/app
      - config_backups:/app/backups
      - prom_multiproc:/tmp/prom_multiproc
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - REDIS_URL=redis://redis:6379/0
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prom_multiproc/celery_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Faz 6B G7: CMD-SHELL so $HOSTNAME resolves inside the container at
      # run time ($$ escapes compose interpolation); matches celery's %h node.
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout=5 --destination=monitor@$$HOSTNAME"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    mem_limit: "3g"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # agent_cmd: bridge-dispatched commands to agents (RTT-bound, moderate concurrency)
  celery_agent_worker:
    networks: [internal]            # T10 B1c
    build: { context: ., dockerfile: backend/Dockerfile }
    command:
      - /bin/sh
      - -c
      - "rm -rf /tmp/prom_multiproc/celery_agent_worker && exec celery -A app.workers.celery_app worker --loglevel=info --concurrency=8 -Q agent_cmd -n agent_cmd@%h"
    volumes:
      - ./backend:/app
      - prom_multiproc:/tmp/prom_multiproc
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - REDIS_URL=redis://redis:6379/0
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prom_multiproc/celery_agent_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout=5 --destination=agent_cmd@$$HOSTNAME"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    mem_limit: "1g"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # default + bulk: correlation tasks, driver, backup, bulk SSH/config ops
  celery_default_worker:
    networks: [internal]            # T10 B1c
    build: { context: ., dockerfile: backend/Dockerfile }
    command:
      - /bin/sh
      - -c
      - "rm -rf /tmp/prom_multiproc/celery_default_worker && exec celery -A app.workers.celery_app worker --loglevel=info --concurrency=8 -Q default,bulk -n default@%h"
    volumes:
      - ./backend:/app
      - config_backups:/app/backups
      - prom_multiproc:/tmp/prom_multiproc
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - REDIS_URL=redis://redis:6379/0
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prom_multiproc/celery_default_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout=5 --destination=default@$$HOSTNAME"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    mem_limit: "2g"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery_beat:
    networks: [internal]            # T10 B1c
    build: { context: ., dockerfile: backend/Dockerfile }
    command:
      - /bin/sh
      - -c
      - "rm -rf /tmp/prom_multiproc/celery_beat && exec celery -A app.workers.celery_app beat --loglevel=info"
    volumes:
      - ./backend:/app
      - prom_multiproc:/tmp/prom_multiproc
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - REDIS_URL=redis://redis:6379/0
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prom_multiproc/celery_beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Faz 6B G7: beat is a scheduler, not a worker — `inspect ping` never
      # matched it (always false-unhealthy). Verify pid 1 is the beat process.
      test: ["CMD-SHELL", "grep -aq beat /proc/1/cmdline || exit 1"]
      interval: 120s
      timeout: 15s
      retries: 3
      start_period: 30s
    mem_limit: "512m"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Faz 6C — ingestion data plane: drains the ingest:syslog Redis Stream and
  # persists batches. Decoupled from the backend (control plane) so a syslog
  # burst can never exhaust the DB pool (KI-4).
  event_consumer:
    networks: [internal]            # T10 B1c
    build: { context: ., dockerfile: backend/Dockerfile }
    command:
      - /bin/sh
      - -c
      - "rm -rf /tmp/prom_multiproc/event_consumer && exec python -m app.services.event_consumer"
    volumes:
      - ./backend:/app
      - prom_multiproc:/tmp/prom_multiproc
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - REDIS_URL=redis://redis:6379/0
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prom_multiproc/event_consumer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Consumer refreshes event_consumer:alive (TTL 30s) every loop iteration.
      test: ["CMD-SHELL", "python3 -c \"import os,redis,sys; sys.exit(0 if redis.from_url(os.environ['REDIS_URL']).exists('event_consumer:alive') else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: "512m"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  flower:
    networks: [internal]            # T10 B1c — internal; debug için dev overlay 5555
    build: { context: ., dockerfile: backend/Dockerfile }
    command: celery -A app.workers.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin123}
    # T10 B1b — host'a publish YOK (yalnız expose). Flower UI'ya local debug
    # için docker-compose.dev.yml 5555'i geri açar; prod'da dışarı kapalı.
    expose:
      - "5555"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - SYNC_DATABASE_URL=postgresql+psycopg2://${APP_DB_USER:-netmgr_app}:${APP_DB_PASSWORD:-netmgr_app_dev_pw}@postgres:5432/${POSTGRES_DB:-network_manager}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    networks: [edge]                # T10 B1c — public tier; DB/redis'e erişmez
    build:
      context: ./frontend
      # T8.4 security/F1 — production stage default (nginx + dist build).
      # Eski "development" target Vite dev server'ı (vite + /src/* + /@vite/*
      # + /__open-in-editor) production'da expose ediyordu (CyberStrike
      # pentest raporu HIGH bulgu). Local geliştirme için docker-compose.
      # override.yml ile target=development + src volume mount kullanılır.
      target: ${FRONTEND_TARGET:-production}
    expose:
      - "3000"   # dev: vite, prod: nginx — ikisi de 3000'de listen (frontend/nginx.conf)
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    networks: [edge, internal]      # T10 B1c — tek dış kapı (edge) + backend proxy (internal)
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

# T10 B1c — network segmentation. edge = public tier (nginx + frontend);
# internal = app/data tier (backend, celery×3, beat, event_consumer, flower,
# postgres, redis). nginx her ikisinde. postgres/redis edge'de DEĞİL → edge-tier
# (frontend) kompromizasyonu DB/redis'e doğrudan pivot edemez.
# internal: true KULLANILMAZ — backend dış erişim gerektirir (OUI/AI/agent egress);
# izolasyon ağ üyeliğiyle (reachability), egress kesilerek değil.
# NOT: monitoring overlay (docker-compose.monitoring.yml) kullanılırsa Prometheus
# backend:8000/metrics'i scrape etmek için `networks: [internal]` ile internal'a eklenmeli.
networks:
  edge:
    driver: bridge
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  config_backups:
  prom_multiproc:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      # T9 (2026-05-21) — bumped 64m → 256m after a SIGBUS restart loop
      # caused by tmpfs saturation: forked Celery worker children (PIDs
      # respawn over the container's lifetime) leave per-PID `.db` files
      # in the multiproc dir; 17k+ stale entries had pushed tmpfs to 100%.
      # 256m + the worker_process_shutdown mark_process_dead hook
      # (app/workers/signals.py) together prevent recurrence. See
      # docs/POSTMORTEM_2026-05-21_PROM_MULTIPROC_TMPFS.md.
      o: "size=256m"
