# NetManager — Monitoring Overlay
#
# Pilot / production monitoring stack (Prometheus + Grafana).
# Ana compose dosyasını değiştirmez — overlay olarak çalışır.
#
# Başlatma:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Ön koşul: .env içinde GRAFANA_PASSWORD tanımlı olmalı.

version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: netmanager_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: netmanager_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    depends_on:
      - prometheus
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  prometheus_data:
  grafana_data:
