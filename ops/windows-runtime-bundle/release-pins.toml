# NetManager Windows Agent v2 — runtime bundle release pins.
#
# This file is a build INPUT. It carries no timestamps. The builder
# requires SOURCE_DATE_EPOCH from the environment for every reproducible
# build; ZIP entry timestamps and the detached manifest `built_utc`
# are derived from that env var (per correction #22 of the architecture
# plan). See README.md.

# The runtime bundle's own version. Reflected in the on-disk
# `.current` sidecar (Section D of the architecture plan) and in the
# `runtime_version` field of the detached manifest.
RUNTIME_VERSION = "1.0.0"

# Embedded Python distribution to seed the runtime tree.
# Pinned by URL + SHA-256. Builder verifies the SHA-256 against
# the downloaded archive (or a vendored local copy) and refuses any
# mismatch. See EMBEDDED_PYTHON_SOURCE.md.
EMBEDDED_PYTHON_URL = "https://www.python.org/ftp/python/3.12.6/python-3.12.6-embed-amd64.zip"
EMBEDDED_PYTHON_SHA256 = "29DEFFFCC1A2B6F8AA67CB0C58F0FF0EA8DD2C8B7AF89A22B89BA45BCD5DA8F8"

# Python version we ship inside the bundle. Recorded in the detached
# manifest's `python_version` field. The minor stays at 3.12 across
# v2 — moving to 3.13 is a separate runtime-version bump.
PYTHON_VERSION = "3.12.6"

# Bundle platform tag — currently the only target.
BUNDLE_PLATFORM = "windows-amd64"

# Host core-version range this bundle is compatible with.
# Restricted grammar per architecture plan Section C.3 + #25:
#   range := ">=" version " " "<" version
# Backend integrity check refuses any other grammar.
COMPATIBLE_HOST_CORE_RANGE = ">=2.0.0 <3.0.0"

# Bundle ZIP size bounds (bytes). Backend integrity check at
# `agents.py:751-835`-parallel rejects out-of-range sidecar values.
# Lower bound catches a truncated download; upper bound catches a
# tampered or swap-in scenario.
SIZE_LOWER_BOUND_BYTES = 5242880      # 5 MiB
SIZE_UPPER_BOUND_BYTES = 209715200    # 200 MiB

# Deterministic ZIP rules — these are reflected in build.py; the
# constants are repeated here as documentation, not as a separate
# source of truth (the builder hard-codes the same values).
ZIP_COMPRESSION_LEVEL = 6   # ZIP_DEFLATED level 6
ZIP_FILE_MODE = 420         # 0o644 (rw-r--r--)
ZIP_EXEC_MODE = 493         # 0o755 (rwxr-xr-x)

# Builder requires this many dependency lines in requirements-windows.lock
# at minimum (a sanity floor catching an empty / placeholder lock).
LOCK_MIN_DEPENDENCY_COUNT = 6
