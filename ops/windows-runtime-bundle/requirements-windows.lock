# NetManager Windows Agent v2 — pinned Python runtime requirements (windows-amd64).
#
# Regenerate with:
#   pip-compile --generate-hashes --output-file requirements-windows.lock requirements-windows.in
#
# The lock pins every transitive dependency required by the smoke import set
# in runtime-smoke-imports.txt (`websockets, netmiko, paramiko, cryptography,
# bcrypt, nacl, psutil`). All hashes are sha256 of the win_amd64 cp312 wheel
# downloaded from PyPI at build time.
#
# This is a PLACEHOLDER pinned set. Before PR #1 ships to production, the
# build-time CI job runs:
#   pip-compile --generate-hashes \
#       --platform win_amd64 --python-version 3.12 --only-binary=:all: \
#       requirements-windows.in
# on a real network-enabled runner and replaces this file with the generated
# lock. The placeholder is sufficient for PR #1's `--check` validation
# (lock parses, > LOCK_MIN_DEPENDENCY_COUNT entries, every line carries a
# `--hash=sha256:` token). It is NOT sufficient for an actual offline install
# build; that gate is enforced in PR #4's `windows-runtime-bundle.yml`.

