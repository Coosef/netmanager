# Frontend production-stage nginx config.
#
# T8.4 / Security F1 — Vite dev mode artık production'da çalıştırılmıyor.
# Bu config SPA dist'ini serve eder + dev path'leri 404 kapatır + sıkı
# security header'lar enjekte eder. Host-level nginx (../nginx/nginx.conf)
# upstream olarak frontend:3000'i çağırıyor; o yüzden port 3000'de listen.

server {
    listen       3000;
    listen       [::]:3000;
    server_name  _;
    server_tokens off;

    # T8.5 — frontend container internal portu 3000; host nginx 443'te
    # dinleyip burada proxy_pass yapıyor. Nginx default auto-redirect
    # (örn. /welcome → /welcome/ trailing slash ekleme) Location header'a
    # `:3000`'i sızdırıyordu → browser https://host:3000/... için 301
    # takibi yapıp public 443 yerine container'ın internal portuna gidiyor
    # → connection refused → "tanitim sayfasi acilmiyor". Iki direktif
    # bunu kapatır: redirect'ler artık relative path (port + scheme yok),
    # browser mevcut origin ile birleştirir.
    absolute_redirect off;
    port_in_redirect off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Defensive 404'lar — Vite/dev path'leri prod'da kesinlikle açık olmasın
    # (CyberStrike pentest HIGH bulgu kapatma) ───────────────────────────────
    location ~ ^/@(vite|fs|react-refresh|id|vite/client) {
        return 404;
    }
    location ~ ^/src/ {
        return 404;
    }
    location ~ ^/node_modules/ {
        return 404;
    }
    location = /__open-in-editor {
        return 404;
    }

    # ── Security headers — host nginx da kendi seviyesinde set ediyor; bu
    #    defansif ikinci katman. browser her zaman en sıkı geçerli olanı
    #    uygular, çift set'leme zararsız. ─────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"            always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"  always;

    # ── SW-KILLSWITCH (2026-06-09) — /sw.js NEVER cache ────────────────────
    # Service worker dosyaları KESINLIKLE cache'lenmemeli; aksi takdirde
    # browser eski sw.js'i tutar, yeni sw.js'i fetch etmez, eski precache
    # manifest eski JS hash'lerini ister → 404 → siyah ekran.
    # Generic .(js|css) location bloğundan ÖNCE exact-match (location =).
    # Nginx precedence: location = > location ^~ > regex > prefix.
    location = /sw.js {
        access_log off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires off;
        try_files $uri =404;
    }

    # Workbox runtime dosyaları da no-store ile servisle (gelecekte VitePWA
    # tekrar enable edilirse workbox-*.js hash'li olur ama defansif olarak
    # exact match bırakmıyoruz — sadece /sw.js kritik).

    # Cache statik asset'ler (hash'li dosya adları → long-cache OK).
    # /sw.js yukarıdaki exact location'ta zaten yakalandı, buraya düşmez.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # T8.5 — Ana sayfa Charon tanıtım sayfasına yönlensin. Bookmark veya
    # doğrudan /dashboard, /login, /devices vb. SPA route'lara giden
    # kullanıcılar etkilenmez (eski davranış aynen).
    location = / {
        return 301 /welcome/;
    }

    # T8.5 — /welcome static landing page (Charon HTML, mockup iframes).
    # SPA fallback'a düşmesin diye explicit location'da; aksi halde React
    # Router /welcome route'unu bilmediği için login'e atıyor.
    location = /welcome {
        return 301 /welcome/;
    }
    location ^~ /welcome/ {
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # SPA fallback — react-router client-side routing.
    # NOT: Eskiden `try_files $uri $uri/ /index.html` idi; $uri/ adımı
    # gerçek dizin olduğunda (örn. /login/ — Vite build login-bg.png'yi
    # bu dizine koyuyor) trailing-slash redirect + 403 üretiyordu.
    # Şimdi $uri/ atlanır, SPA route'ları doğrudan index.html'e gider.
    location / {
        try_files $uri /index.html;
        # index.html her zaman taze (yeni deploy hemen alınsın)
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Gzip — js/css/html için işe yarar
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
