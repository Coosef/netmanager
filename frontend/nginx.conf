# Frontend production-stage nginx config.
#
# T8.4 / Security F1 — Vite dev mode artık production'da çalıştırılmıyor.
# Bu config SPA dist'ini serve eder + dev path'leri 404 kapatır + sıkı
# security header'lar enjekte eder. Host-level nginx (../nginx/nginx.conf)
# upstream olarak frontend:3000'i çağırıyor; o yüzden port 3000'de listen.

server {
    listen       3000;
    listen       [::]:3000;
    server_name  _;
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Defensive 404'lar — Vite/dev path'leri prod'da kesinlikle açık olmasın
    # (CyberStrike pentest HIGH bulgu kapatma) ───────────────────────────────
    location ~ ^/@(vite|fs|react-refresh|id|vite/client) {
        return 404;
    }
    location ~ ^/src/ {
        return 404;
    }
    location ~ ^/node_modules/ {
        return 404;
    }
    location = /__open-in-editor {
        return 404;
    }

    # ── Security headers — host nginx da kendi seviyesinde set ediyor; bu
    #    defansif ikinci katman. browser her zaman en sıkı geçerli olanı
    #    uygular, çift set'leme zararsız. ─────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"            always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"  always;

    # Cache statik asset'ler (hash'li dosya adları → long-cache OK)
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — react-router client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        # index.html her zaman taze (yeni deploy hemen alınsın)
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Gzip — js/css/html için işe yarar
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
