<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>NetManager — Otomasyon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: oklch(0.16 0.012 250); font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    body.theme-light { background: oklch(0.985 0.003 250); }
    #root { height: 100%; }
    .nm-main > .nm-workspace { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
    .nm-main > .nm-workspace > * { flex: 1; min-height: 0; overflow: auto; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="widgets.jsx"></script>
  <script type="text/babel" src="customize-panel.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="commandk.jsx"></script>
  <script type="text/babel" src="pages-automation.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    function App() {
      return (
        <Shell active="automation" screenLabel="Otomasyon" showTicker={false}>
          <AutomationPage />
        </Shell>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
