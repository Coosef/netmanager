<?xml version="1.0" encoding="UTF-8"?>
<!-- Charon — altın elmas + Ω + dik mızrak.
     Kullanıcının verdiği marka görseline yakın geometrik yorum.
     Tek renk (currentColor uyumlu) için stroke=currentColor varyantı:
     CSS'te `color: gold` set edilince inline kullanım için.
     Burada gradient'li versiyon — favicon ve PNG fallback için. -->
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Charon">
  <defs>
    <linearGradient id="charon-gold" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%"  stop-color="#FFE57A"/>
      <stop offset="35%" stop-color="#F0C040"/>
      <stop offset="70%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#9C7212"/>
    </linearGradient>
    <linearGradient id="charon-gold-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FFE57A"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <filter id="charon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#charon-glow)" stroke="url(#charon-gold)" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- Dış elmas -->
    <path d="M100 14 L186 100 L100 186 L14 100 Z" stroke-width="3.5"/>
    <!-- İç elmas -->
    <path d="M100 30 L170 100 L100 170 L30 100 Z" stroke-width="2.5"/>

    <!-- Yan compass-arrow notch'ları -->
    <path d="M44 96 L40 100 L44 104" stroke-width="2"/>
    <path d="M156 96 L160 100 L156 104" stroke-width="2"/>

    <!-- Üst 4-uçlu yıldız (dolu) -->
    <path d="M100 44 L104 55 L115 59 L104 63 L100 74 L96 63 L85 59 L96 55 Z"
          fill="url(#charon-gold-fill)" stroke-width="0.6"/>

    <!-- Ortada Ω (omega / horseshoe) -->
    <!-- Üst yay (yarım daire) -->
    <path d="M75 118 A26 23 0 0 1 125 118" stroke-width="3.5"/>
    <!-- Sol alt kıvrım -->
    <path d="M75 118 Q73 132 66 138 L82 138" stroke-width="3.5"/>
    <!-- Sağ alt kıvrım -->
    <path d="M125 118 Q127 132 134 138 L118 138" stroke-width="3.5"/>

    <!-- Ω'nin altından çıkan dik mızrak -->
    <path d="M100 110 L100 158" stroke-width="2.2"/>
    <!-- Mızrak ucu -->
    <path d="M94 150 L100 168 L106 150 Z" fill="url(#charon-gold-fill)" stroke-width="0.6"/>
  </g>
</svg>
